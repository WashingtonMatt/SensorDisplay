; SensorDisplay
; Personal ESP32-C3 battery/environment dashboard
; Clean-break fork of ChargeScreen, scoped to:
;   - Victron SmartShunt + MPPT 100/30 (BLE Instant Readout)
;   - Up to 4 RuuviTags (RAWv2), MAC-paired, labeled, per-tag temp range
;
; Package versions below are the known-good set carried over from the
; previous ChargeScreen fork build. Do not bump without re-testing on
; hardware, particularly framework-arduinoespressif32 and NimBLE-Arduino.

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

platform_packages =
    framework-arduinoespressif32 @ 3.20017.241212

lib_deps =
    h2zero/NimBLE-Arduino @ 2.5.0
    moononournation/GFX Library for Arduino @ 1.4.7
    bblanchon/ArduinoJson @ ^7.1.0   ; NOTE: not in the original carryover list.
                                      ; Added for the multi-RuuviTag JSON NVS blob
                                      ; (config storage). Pull if you'd rather
                                      ; hand-roll a fixed-size binary struct instead.

monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    log2file

build_flags =
    -DCORE_DEBUG_LEVEL=2   ; Warn -- was 3 (Info), which made NimBLE's internal
                            ; per-advertisement scan logging ("New advertiser",
                            ; "Scan response", "Duplicate; updated") flood the
                            ; serial monitor, burying our own diagLog() output
                            ; and any real warnings/errors underneath it.
    -DARDUINO_USB_MODE=1    ; Required together with ARDUINO_USB_CDC_ON_BOOT below
                            ; on esp32-c3-devkitm-1 specifically -- setting only
                            ; one of the two leaves Serial in an inconsistent
                            ; state (won't even compile: "Serial was not
                            ; declared in this scope"). Confirmed via multiple
                            ; independent PlatformIO community/GitHub reports
                            ; for this exact board.
    -DARDUINO_USB_CDC_ON_BOOT=1   ; Without this, Serial doesn't reliably map to
                            ; the USB Serial/JTAG peripheral this board's USB-C
                            ; port is wired to on the ESP32-C3 -- ESP-IDF's own
                            ; internal logging is configured separately and was
                            ; reaching the monitor fine regardless, which is why
                            ; framework [W]/[E] messages always showed up but
                            ; every one of our own Serial.println()/printf()
                            ; calls never did.
